<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梵木圣山文创园指引图</title>
    <style>
        body { margin: 0; padding: 0; background: #f0f0f0; }
        .map-container { position: relative; width: 100%; max-width: 1000px; margin: 0 auto; }
        .map-container img { width: 100%; display: block; }
        /* 热区定位：对应图片右下角导航链接的位置 */
        .map-hotspot {
            position: absolute;
            bottom: 5%;
            right: 5%;
            width: 40%;
            height: 15%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="map-container">
        <!-- 这里替换成你上传到图床的指引图链接 -->
        <img src="map11.jpg" alt="梵木圣山文创园指引图">
        <!-- 可点击跳转的热区 -->
        <a href="https://surl.amap.com/hyk24p81ufZa" target="_blank" class="map-hotspot"></a>
    </div>
</body>
</html>
